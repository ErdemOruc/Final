<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAIA Dashboard</title>
    <meta name="description" content="AI-powered plant health monitoring dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="dashboard-container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path></svg>
                <h1>GAIA</h1>
            </div>
            <div class="status-indicator">
                <div class="pulse-dot" id="connection-dot"></div>
                <span id="connection-text">Connecting...</span>
            </div>
        </header>

        <main class="main-content">
            <div class="glass-panel image-panel">
                <div class="panel-header">
                    <h2>Live Analysis Feed</h2>
                    <span class="badge" id="time-badge">0ms</span>
                </div>
                <div class="image-container" id="image-container">
                    <div class="placeholder-content" id="image-placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        <p>Waiting for image data...</p>
                    </div>
                    <img id="annotated-image" src="" alt="Annotated Plant" style="display: none;">
                </div>
            </div>

            <div class="details-column">
                <div class="glass-panel status-panel" id="status-panel">
                    <div class="status-header">
                        <h2>Overall Status</h2>
                        <div class="status-chip" id="overall-status-chip">Waiting</div>
                    </div>
                    <p id="summary-text" class="summary-text">Waiting for the pipeline to process an image...</p>
                </div>

                <div class="glass-panel llm-panel">
                    <div class="panel-header">
                        <h2>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            AI Agronomist Advice
                        </h2>
                    </div>
                    <div class="llm-content" id="llm-content">
                        <div class="typing-indicator" id="llm-placeholder">
                            <span></span><span></span><span></span>
                        </div>
                        <div id="llm-text" style="display: none;"></div>
                    </div>
                </div>

                <div class="glass-panel" style="margin-top: 1rem; text-align: center;">
                    <a href="details.html" class="details-button">
                        View Detailed Detections
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
